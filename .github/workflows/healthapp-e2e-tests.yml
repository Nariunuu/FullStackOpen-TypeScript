name: Health app E2E Tests

on:
  push:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: |
          healthapp/package-lock.json
          healthapp-tests/package-lock.json

    - name: Install healthapp dependencies
      working-directory: ./healthapp
      run: npm ci

    - name: Lint healthapp
      working-directory: ./healthapp
      run: npm run lint

    - name: Start healthapp server
      working-directory: ./healthapp
      run: |
        npm start &
        echo $! > server.pid

    - name: Install test dependencies
      working-directory: ./healthapp-tests
      run: npm ci

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('healthapp-tests/package-lock.json') }}

    - name: Install Playwright browsers
      working-directory: ./healthapp-tests
      run: npx playwright install --only-shell chromium

    - name: Wait for healthapp server
      run: npx wait-on http://localhost:3000/hello --timeout 60000

    - name: Run e2e tests
      working-directory: ./healthapp-tests
      run: npm test

    - name: Upload test report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: playwright-report
        path: healthapp-tests/playwright-report/
        retention-days: 30

    - name: Stop healthapp server
      if: always()
      working-directory: ./healthapp
      run: |
        if [ -f server.pid ]; then
          kill $(cat server.pid) || true
        fi
